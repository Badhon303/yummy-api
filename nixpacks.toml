# Nixpacks configuration for Dokploy deployment.
# Runs Payload database migrations before starting the production server so
# that newly added collections (e.g. Payments, Deliveries) get their tables
# created in the deployed database.

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm run build"]

# FIRST DEPLOY ONLY: migrate:fresh drops all tables (your DB still holds the
# dev-pushed schema) and applies migrations cleanly. After the first successful
# boot, change this back to:  pnpm run migrate && pnpm run start
[start]
cmd = "pnpm run start"
